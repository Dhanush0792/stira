name: stira
description: Stability over impulse. Behavior stability app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  home_widget: ^0.9.0
  csv: ^7.1.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.2
  local_auth: ^3.0.1
  # Master Prompt — Section 6C additions
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  vibration: ^2.0.0
  flutter_tts: ^4.2.0
  timer_builder: ^2.0.0
  supabase_flutter: ^2.3.4
  intl: ^0.19.0
  firebase_messaging: ^16.1.2
  firebase_storage: ^13.1.0
  google_sign_in: ^6.2.1
  usage_stats: ^1.1.0
  permission_handler: ^11.3.1
  workmanager: ^0.9.0
  flutter_timezone: ^5.0.2
  flutter_native_splash: ^2.4.7
  url_launcher: ^6.2.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/icon/stira_logo.png
    - assets/icon/stira_logo_showcase.png
    - assets/shadow_mode/calculator.png
    - assets/shadow_mode/finance.png
    - assets/shadow_mode/notes.png
    - assets/shadow_mode/weather.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23

flutter_native_splash:
  color: "#0B0C10"
  image: "assets/icon/app_icon.png"
  android_12:
    color: "#0B0C10"
    image: "assets/icon/app_icon.png"
