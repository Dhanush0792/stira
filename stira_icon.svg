<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background deep space -->
    <radialGradient id="bg" cx="45%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1C0A2E"/>
      <stop offset="100%" stop-color="#07060F"/>
    </radialGradient>

    <!-- Orb core -->
    <radialGradient id="orb" cx="40%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#FF72B5"/>
      <stop offset="30%" stop-color="#E8307A"/>
      <stop offset="68%" stop-color="#A030CC"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </radialGradient>

    <!-- Orb highlight (top-left catch light) -->
    <radialGradient id="hl" cx="33%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ambient -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8307A" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#7C4DFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#07060F" stop-opacity="0"/>
    </radialGradient>

    <!-- Pulse line gradient -->
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1ECFB3" stop-opacity="0"/>
      <stop offset="15%" stop-color="#1ECFB3" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="78%" stop-color="#E8307A" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Teal glow -->
    <filter id="tGlow" x="-40%" y="-500%" width="180%" height="1100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <!-- Pink orb glow -->
    <filter id="oGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <!-- Halo filter -->
    <filter id="halo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="52"/>
    </filter>

    <!-- Spike glow -->
    <filter id="sGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Rounded square background (iOS icon) -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Outer ambient halo -->
  <circle cx="512" cy="500" r="310" fill="url(#ambient)" filter="url(#halo)" opacity="0.85"/>

  <!-- Orbital ring faint -->
  <circle cx="512" cy="500" r="258" fill="none" stroke="#E8307A" stroke-width="0.8" opacity="0.12"/>
  <circle cx="512" cy="500" r="286" fill="none" stroke="#7C4DFF" stroke-width="0.6" opacity="0.08" stroke-dasharray="6 10"/>

  <!-- Orb glow layer -->
  <circle cx="512" cy="500" r="198" fill="url(#orb)" filter="url(#oGlow)" opacity="0.5"/>

  <!-- Orb main body -->
  <circle cx="512" cy="500" r="198" fill="url(#orb)"/>

  <!-- Orb inner highlight -->
  <circle cx="512" cy="500" r="198" fill="url(#hl)"/>

  <!-- Orb border ring -->
  <circle cx="512" cy="500" r="198" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.20"/>

  <!-- Inner atmosphere circle -->
  <circle cx="512" cy="500" r="158" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.07"/>

  <!-- ── NEURAL PULSE LINE ──
       Centered through the orb. 
       Flat → micro bump → BIG spike up → valley down → recovery → flat
       The spike peak sits LEFT of center in the orb (off-center looks intentional)
  -->

  <!-- Teal glow version (blurred, behind) -->
  <path
    d="M 195 500
       L 318 500
       Q 330 500 336 491
       L 347 473
       L 358 524
       L 370 438
       L 384 562
       L 396 486
       L 405 500
       L 830 500"
    fill="none"
    stroke="#1ECFB3"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#tGlow)"
    opacity="0.45"/>

  <!-- Main gradient line -->
  <path
    d="M 195 500
       L 318 500
       Q 330 500 336 491
       L 347 473
       L 358 524
       L 370 438
       L 384 562
       L 396 486
       L 405 500
       L 830 500"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- White crisp center line -->
  <path
    d="M 195 500
       L 318 500
       Q 330 500 336 491
       L 347 473
       L 358 524
       L 370 438
       L 384 562
       L 396 486
       L 405 500
       L 830 500"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.80"/>

  <!-- Peak glow dot -->
  <circle cx="370" cy="438" r="12" fill="#FFFFFF" opacity="0.9" filter="url(#sGlow)"/>
  <circle cx="370" cy="438" r="5" fill="#FFFFFF"/>
  <circle cx="370" cy="438" r="2.5" fill="#FFFFFF"/>

  <!-- Neural node dots on orb surface -->
  <!-- Top -->
  <circle cx="512" cy="305" r="6" fill="#FFFFFF" opacity="0.65" filter="url(#tGlow)"/>
  <circle cx="512" cy="305" r="3" fill="#FFFFFF" opacity="0.9"/>
  <!-- Bottom right -->
  <circle cx="655" cy="600" r="5" fill="#1ECFB3" opacity="0.8" filter="url(#tGlow)"/>
  <circle cx="655" cy="600" r="2.5" fill="#1ECFB3"/>
  <!-- Left -->
  <circle cx="338" cy="438" r="4" fill="#E8307A" opacity="0.6"/>

</svg>
